<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jolt AI Command Center — Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f6f8;--card:#fff;--el:#f0f1f4;--bdr:#e2e4ea;--tx:#1a1d26;--tx2:#5c6070;--tx3:#9095a4;--grn:#16a34a;--grn-s:#dcfce7;--grn-b:#86efac;--blu:#2563eb;--blu-s:#dbeafe;--pur:#7c3aed;--pur-s:#ede9fe;--amb:#d97706;--amb-s:#fef3c7;--red:#dc2626;--red-s:#fee2e2;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
.d{max-width:1400px;margin:0 auto;padding:14px 24px 40px}
.hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hd-l{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,#16a34a,#15803d);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
.hd-t{font-size:15px;font-weight:700}.hd-s{font-size:9px;color:var(--tx3)}
.live{display:flex;align-items:center;gap:4px;padding:2px 8px;background:var(--grn-s);border:1px solid var(--grn-b);border-radius:12px;font-size:8px;font-weight:600;color:var(--grn)}
.dot{width:5px;height:5px;background:var(--grn);border-radius:50%;animation:p 2s infinite}@keyframes p{50%{opacity:.3}}
.mg{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.mc{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:7px 9px;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mc.r::after{background:var(--red)}.mc.y::after{background:var(--amb)}.mc.g::after{background:var(--grn)}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.kp{font-size:7px;font-weight:700;padding:1px 4px;border-radius:4px}
.kp.r{background:var(--red-s);color:var(--red)}.kp.y{background:var(--amb-s);color:var(--amb)}.kp.g{background:var(--grn-s);color:var(--grn)}
.ml{font-size:7.5px;font-weight:600;text-transform:uppercase;color:var(--tx3)}.mv{font-family:'JetBrains Mono';font-size:16px;font-weight:600}.mt2{font-family:'JetBrains Mono';font-size:7px;color:var(--tx3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.pn{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.pt{font-size:11px;font-weight:700}.pb{font-size:7.5px;font-weight:600;padding:2px 6px;border-radius:4px;background:var(--el);color:var(--tx3)}
.sr{display:flex;justify-content:space-between;padding:6px 9px;background:var(--el);border-radius:5px;margin-bottom:2px;cursor:pointer;font-size:10px;transition:all .15s}.sr:hover{background:#e6e7ec;transform:translateX(2px)}
.hint{margin-top:6px;padding:5px 8px;background:var(--grn-s);border-radius:5px;font-size:8.5px;color:var(--grn);font-weight:500}
.esc-row{display:grid;grid-template-columns:1fr 55px 32px;gap:3px;padding:5px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;font-size:9.5px;transition:all .15s}
.esc-row:hover{transform:translateX(2px)}
.esc-row.gap{background:var(--red-s);border-left:3px solid var(--red)}.esc-row.tried{background:var(--amb-s);border-left:3px solid var(--amb)}
.ef{display:flex;gap:2px;margin-bottom:5px}.ef button{padding:2px 6px;border-radius:3px;font-size:7.5px;font-weight:600;cursor:pointer;border:1px solid var(--bdr);background:var(--el);color:var(--tx3);font-family:'Outfit'}.ef button.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.road{display:grid;grid-template-columns:22px 1fr 50px 70px;align-items:center;gap:5px;padding:6px 8px;border-radius:6px;margin-bottom:2px}
.road-n{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:#fff}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:24px 14px;overflow-y:auto}.mo.show{display:flex}
.modal{background:var(--card);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.15);width:100%;max-width:560px;max-height:82vh;overflow-y:auto;animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.mh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 0}.mt3{font-size:14px;font-weight:700}
.mx{width:24px;height:24px;border-radius:6px;border:1px solid var(--bdr);background:var(--el);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:var(--tx3)}.mx:hover{background:var(--red-s);color:var(--red)}
.mb{padding:10px 16px 16px}
.mlbl{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--tx3);margin-bottom:3px;margin-top:8px}
.mtxt{font-size:11px;color:var(--tx2);line-height:1.5}
.macts{display:flex;gap:6px;flex-wrap:wrap;padding-top:10px;margin-top:8px;border-top:1px solid var(--bdr)}
.btn{padding:8px 14px;border-radius:7px;border:none;font-family:'Outfit';font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn.pri{background:var(--blu);color:#fff}.btn.suc{background:var(--grn);color:#fff}.btn.pur{background:var(--pur);color:#fff}
.btn.sec{background:var(--el);color:var(--tx2);border:1px solid var(--bdr)}
.btn:disabled{opacity:.4;cursor:default}
.mnote{font-size:8.5px;color:var(--tx3);margin-top:6px;line-height:1.4}
.result{margin-top:10px;padding:10px;border-radius:8px;font-size:10px;max-height:200px;overflow-y:auto}
.result.ok{background:var(--grn-s);border:1px solid var(--grn-b)}.result.err{background:var(--red-s);border:1px solid #fca5a5}
.result h4{font-size:11px;margin-bottom:4px}.result pre{font-family:'JetBrains Mono';font-size:9px;white-space:pre-wrap;line-height:1.5}
.toast{position:fixed;bottom:14px;right:14px;background:var(--tx);color:#fff;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:2000;transform:translateY(50px);opacity:0;transition:all .3s;max-width:380px}.toast.show{transform:none;opacity:1}
.log-row{display:flex;gap:5px;font-size:9.5px;padding:2px 0;border-bottom:1px solid var(--el)}
@media(max-width:900px){.mg{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="d">
<div class="hd"><div class="hd-l"><div class="logo">⚡</div><div><div class="hd-t">Jolt Fin AI — Command Center</div><div class="hd-s">Buttons connect live to Intercom via Claude API → MCP</div></div></div><div class="live"><div class="dot"></div>LIVE</div></div>

<!-- KPIs -->
<div class="mg" id="kpis"></div>

<!-- KB + Escalations -->
<div class="g2">
<div class="pn"><div class="ph"><div class="pt">Knowledge Base Health</div><div class="pb">327</div></div><div id="kbList"></div><div class="hint">Click any row → <strong>Fix & Send to Draft</strong> or <strong>Fix & Make Live</strong></div></div>
<div class="pn"><div class="ph"><div class="pt">🔴 Live Escalations</div><div class="pb">Today</div></div><div class="ef" id="escFilters"></div><div id="escList" style="max-height:200px;overflow-y:auto"></div></div>
</div>

<!-- Road -->
<div class="pn" style="margin-bottom:8px"><div class="ph"><div class="pt">🎯 Road to 95% Resolution</div><div class="pb">23.4pp to close</div></div>
<div style="height:6px;background:var(--el);border-radius:3px;overflow:hidden;margin-bottom:8px"><div style="width:75.4%;height:100%;background:linear-gradient(90deg,var(--amb),var(--grn));border-radius:3px"></div></div>
<div id="roadList"></div></div>

<!-- Action Log -->
<div class="pn" id="logPanel" style="display:none"><div class="ph"><div class="pt">📋 Action Log</div></div><div id="logList"></div></div>
</div>

<!-- Modal -->
<div class="mo" id="mo" onclick="if(event.target===this)closeModal()">
<div class="modal"><div class="mh"><div class="mt3" id="modalTitle"></div><div class="mx" onclick="closeModal()">✕</div></div><div class="mb" id="modalBody"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ════════ CLAUDE API → INTERCOM MCP ════════
async function callClaude(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: "You are an Intercom help center editor for Jolt Software (workspace vna7zlcy, author_id 8946047). Use Intercom MCP tools to execute the request. Be concise.",
      messages: [{ role: "user", content: prompt }],
      mcp_servers: [{ type: "url", url: "https://mcp.intercom.com/mcp", name: "intercom" }]
    })
  });
  if (!res.ok) throw new Error("API error " + res.status + ": " + (await res.text()).slice(0, 200));
  const d = await res.json();
  const texts = (d.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  const tools = (d.content || []).filter(b => b.type === "mcp_tool_use").map(b => b.name);
  return { texts, tools };
}

// ════════ DATA ════════
const KPI_DATA = [
  { l: "Resolution", v: "71.6%", t: "95%", s: "r", i: "✅" },
  { l: "Automation", v: "51.1%", t: "80%", s: "r", i: "⚡" },
  { l: "Involvement", v: "71.4%", t: "80%", s: "y", i: "🤖" },
  { l: "CSAT", v: "46.1%", t: "85%", s: "r", i: "⭐" },
  { l: "Handoff", v: "28.4%", t: "≤5%", s: "r", i: "🔀" },
  { l: "Response", v: "5.2m", t: "≤4m", s: "y", i: "⏱" }
];

const KB_DATA = [
  { id: "desc", label: "Missing Descriptions", count: 239, pct: "73%", color: "var(--red)",
    detail: "239 articles have no description. Descriptions are Fin's #1 matching signal — the single biggest lever for improving resolution.",
    recs: "Push descriptions to articles. Low risk — only adds metadata. Estimated +5-10% resolution improvement.",
    draftPrompt: "Search for 3 published Intercom articles that have an empty or missing description. For each one, generate a concise 1-2 sentence SEO description and update the article description. Keep the articles published. Return the article IDs, titles, and new descriptions you added.",
    livePrompt: "Search for 3 published Intercom articles that have an empty or missing description. For each one, generate a concise 1-2 sentence SEO description and update the article description. Keep articles published. Return article IDs, titles, and new descriptions." },
  { id: "links", label: "No Cross-Links", count: 230, pct: "71%", color: "var(--amb)",
    detail: "230 articles have zero links to related content. Dead-end articles cause escalations because Fin can't guide users to the next step.",
    recs: "Add 2-3 Related Articles links per article. Prioritize troubleshooting articles.",
    draftPrompt: "Find 2 published Intercom articles about Jolt printer troubleshooting. Add a Related Articles HTML section at the end of each article body with links to 2-3 related articles. Save as draft for review. Return what you changed.",
    livePrompt: "Find 2 published Intercom articles about Jolt printer troubleshooting. Add a Related Articles HTML section at the end of each article body with links to 2-3 related articles. Keep published. Return what you changed." },
  { id: "thin", label: "Thin Content (<200w)", count: 40, pct: "12%", color: "var(--amb)",
    detail: "40 articles under 200 words — not enough content for Fin to resolve. 6 articles are under 50 words.",
    recs: "Expand to 300+ words minimum. Add troubleshooting steps, FAQs, edge cases.",
    draftPrompt: "Find 1 very short published Intercom article (under 200 words) about Jolt. Expand its body with additional troubleshooting steps, FAQ section, and helpful tips. Save as draft. Return the article ID and what you added.",
    livePrompt: "Find 1 very short published Intercom article (under 200 words) about Jolt. Expand its body with additional troubleshooting steps, FAQ section, and helpful tips. Keep published. Return the article ID and what you added." },
  { id: "gram", label: "Grammar Issues", count: 12, pct: "4%", color: "var(--tx3)",
    detail: "12 remaining cosmetic double-space issues. 13 articles with real typos already fixed this session.",
    recs: "Fix double spaces and capitalization errors. Low risk — safe to push directly.",
    draftPrompt: "Fetch Intercom article 9787431. Find double spaces in the body text (two spaces where there should be one) and fix them. Also capitalize any lowercase letters that appear after periods. Save as draft. Return what you fixed.",
    livePrompt: "Fetch Intercom article 9787431. Find double spaces in the body text and fix them. Also capitalize lowercase letters after periods. Keep published. Return what you fixed." }
];

const ESC_DATA = [
  { id: "215473507702571", title: "List population issue", team: "CHATS", sla: "miss", arts: [], gap: true },
  { id: "215473520780644", title: "Cancel account", team: "BILLING", sla: "miss", arts: [], gap: true },
  { id: "215473505524929", title: "Manufacturer warranty", team: "CHATS", sla: "hit", arts: [], gap: true },
  { id: "215473506980687", title: "Cancel Jolt account", team: "CANCEL", sla: "miss", arts: [], gap: true },
  { id: "215473478693240", title: "Other (abandoned)", team: "TECH", sla: "na", arts: [], gap: true },
  { id: "215473521712992", title: "Follow up work order", team: "BILLING", sla: "miss", arts: ["Payment Method", "Work Orders"] },
  { id: "215473523716866", title: "App labels not displaying", team: "CHATS", sla: "miss", arts: ["Sync Issues", "Reset App"] },
  { id: "215473518649176", title: "Printer replacement status", team: "CHATS", sla: "hit", arts: ["Printer repair FAQ"] },
  { id: "215473519436069", title: "Unblock time off requests", team: "CHATS", sla: "miss", arts: ["Sync Issues", "Block Time Off"] }
];

const ROAD_DATA = [
  { n: 1, name: "Fix Content", sub: "Descriptions + cross-links + grammar", imp: "+8-10%", st: "IN PROGRESS", c: "#2563eb", bg: "#dbeafe" },
  { n: 2, name: "Fill Gaps", sub: "New articles for zero-content topics", imp: "+5-7%", st: "5 GAPS", c: "#7c3aed", bg: "#ede9fe" },
  { n: 3, name: "Reduce Bypass", sub: "Routing + email enablement", imp: "+8-12%", st: "NOT STARTED", c: "#d97706", bg: "#fef3c7" },
  { n: 4, name: "Quality Loop", sub: "Weekly escalation review", imp: "+3-5%", st: "ACTIVE", c: "#16a34a", bg: "#dcfce7" }
];

let escFilter = "all", actionLog = [], busy = false;

// ════════ RENDER ════════
function renderKPIs() {
  const SL = { g: "ON TARGET", y: "NEAR", r: "BELOW" };
  document.getElementById("kpis").innerHTML = KPI_DATA.map(k =>
    `<div class="mc ${k.s}"><div class="mc-top"><span style="font-size:11px">${k.i}</span><span class="kp ${k.s}">${SL[k.s]}</span></div><div class="ml">${k.l}</div><div class="mv">${k.v}</div><div class="mt2">Target: ${k.t}</div></div>`
  ).join("");
}

function renderKB() {
  document.getElementById("kbList").innerHTML = KB_DATA.map(k =>
    `<div class="sr" onclick="openKB('${k.id}')"><span style="color:var(--tx2)">${k.label}</span><span style="font-family:'JetBrains Mono';font-weight:600;color:${k.color}">${k.count} (${k.pct})</span></div>`
  ).join("");
}

function renderEsc() {
  const filters = [["all", "All (" + ESC_DATA.length + ")"], ["gaps", "🔴 Gaps"], ["miss", "⏱ SLA Miss"]];
  document.getElementById("escFilters").innerHTML = filters.map(([v, l]) =>
    `<button class="${escFilter === v ? "on" : ""}" onclick="escFilter='${v}';renderEsc()">${l}</button>`
  ).join("");
  let list = ESC_DATA;
  if (escFilter === "gaps") list = list.filter(e => e.gap);
  if (escFilter === "miss") list = list.filter(e => e.sla === "miss");
  document.getElementById("escList").innerHTML = list.map(e => {
    const cls = e.gap ? "gap" : "tried";
    const slaC = e.sla === "hit" ? "var(--grn)" : e.sla === "miss" ? "var(--red)" : "var(--tx3)";
    const slaBg = e.sla === "hit" ? "var(--grn-s)" : e.sla === "miss" ? "var(--red-s)" : "var(--el)";
    return `<div class="esc-row ${cls}" onclick="openEsc('${e.id}')"><div><div style="font-weight:600">${e.title}</div><div style="font-size:7px;color:var(--tx3)">${e.arts.length ? e.arts.join(", ") : "No articles"}</div></div><div style="font-family:'JetBrains Mono';font-size:7px;color:var(--tx3)">${e.team}</div><div style="font-family:'JetBrains Mono';font-size:7px;font-weight:700;text-align:center;padding:1px 2px;border-radius:2px;color:${slaC};background:${slaBg}">${e.sla === "hit" ? "HIT" : e.sla === "miss" ? "MISS" : "—"}</div></div>`;
  }).join("");
}

function renderRoad() {
  document.getElementById("roadList").innerHTML = ROAD_DATA.map(p =>
    `<div class="road" style="background:${p.bg}"><div class="road-n" style="background:${p.c}">${p.n}</div><div><div style="font-size:10px;font-weight:600">${p.name}</div><div style="font-size:7.5px;color:var(--tx3)">${p.sub}</div></div><div style="font-family:'JetBrains Mono';font-size:9px;font-weight:700;color:${p.c};text-align:center">${p.imp}</div><div style="font-family:'JetBrains Mono';font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px;background:${p.c};color:#fff;text-align:center">${p.st}</div></div>`
  ).join("");
}

function renderLog() {
  if (!actionLog.length) { document.getElementById("logPanel").style.display = "none"; return; }
  document.getElementById("logPanel").style.display = "block";
  document.getElementById("logList").innerHTML = actionLog.slice(0, 5).map(a =>
    `<div class="log-row"><span style="font-family:'JetBrains Mono';font-size:8px;color:var(--tx3);min-width:55px">${a.ts}</span><span style="color:${a.ok ? "var(--grn)" : "var(--red)"}">${a.ok ? "✅" : "❌"} ${a.label}</span></div>`
  ).join("");
}

// ════════ MODALS ════════
function openModal(title, body) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("mo").classList.add("show");
}
function closeModal() { document.getElementById("mo").classList.remove("show"); }

function openKB(id) {
  const k = KB_DATA.find(x => x.id === id);
  openModal("KB: " + k.label,
    `<div class="mlbl">Impact Assessment</div><div class="mtxt">${k.detail}</div>` +
    `<div class="mlbl">Recommendations</div><div class="mtxt" style="padding:6px 8px;background:var(--el);border-radius:6px">${k.recs}</div>` +
    `<div class="macts">` +
    `<button class="btn pri" id="btnDraft" onclick="runAction('${id}','draft')">📝 Fix & Send to Draft</button>` +
    `<button class="btn suc" id="btnLive" onclick="runAction('${id}','live')">🚀 Fix & Make Live</button>` +
    `<button class="btn sec" onclick="closeModal()">Close</button>` +
    `</div>` +
    `<div class="mnote">These buttons call Claude API → Claude calls Intercom MCP → articles are updated in your help center.</div>` +
    `<div id="resultBox"></div>`
  );
}

function openEsc(id) {
  const e = ESC_DATA.find(x => x.id === id);
  const artsHtml = e.arts.length
    ? `<div class="mlbl">Articles Fin Referenced</div>` + e.arts.map(a => `<div style="padding:3px 8px;background:var(--el);border-radius:4px;margin-bottom:2px;font-size:10px">→ ${a}</div>`).join("")
    : `<div style="padding:8px;background:var(--red-s);border-radius:6px;font-size:11px;color:var(--red);font-weight:600;margin-bottom:6px">⚠ Content Gap — Fin had zero articles to reference</div>`;

  const gapBtns = e.gap
    ? `<button class="btn pur" id="btnDraft" onclick="createArticle('${e.title}','draft')">📝 Create & Send to Draft</button>` +
      `<button class="btn suc" id="btnLive" onclick="createArticle('${e.title}','live')">🚀 Create & Publish Live</button>`
    : "";

  openModal(e.title,
    `<div class="mtxt"><strong>Team:</strong> ${e.team} · <strong>SLA:</strong> ${e.sla}</div>` +
    artsHtml +
    `<div class="macts">` +
    `<a href="https://app.intercom.com/a/apps/vna7zlcy/inbox/inbox/all/conversations/${e.id}" target="_blank" class="btn pri" style="text-decoration:none">↗ Open in Intercom</a>` +
    gapBtns +
    `<button class="btn sec" onclick="closeModal()">Close</button>` +
    `</div>` +
    `<div class="mnote">Draft creates an article for review. Live publishes immediately.</div>` +
    `<div id="resultBox"></div>`
  );
}

// ════════ EXECUTE ACTIONS ════════
async function runAction(kbId, mode) {
  if (busy) return;
  busy = true;
  const k = KB_DATA.find(x => x.id === kbId);
  const prompt = mode === "draft" ? k.draftPrompt : k.livePrompt;
  const label = k.label + " → " + (mode === "draft" ? "Draft" : "Live");
  disableButtons();
  showResult("loading", "⏳ Claude is calling Intercom...");
  try {
    const r = await callClaude(prompt);
    showResult("ok", r.texts + (r.tools.length ? "\n\nTools used: " + r.tools.join(", ") : ""));
    addLog(label, true);
    showToast("✅ " + label + " — done");
  } catch (err) {
    showResult("err", err.message);
    addLog(label, false);
    showToast("❌ " + err.message);
  } finally { busy = false; enableButtons(); }
}

async function createArticle(title, mode) {
  if (busy) return;
  busy = true;
  const state = mode === "draft" ? "draft" : "published";
  const label = "Create: " + title + " → " + (mode === "draft" ? "Draft" : "Live");
  disableButtons();
  showResult("loading", "⏳ Claude is creating the article...");
  try {
    const r = await callClaude(
      `Create a new Intercom article. Title: "Troubleshooting: ${title}". ` +
      `Write a comprehensive HTML body for Jolt customers about "${title}". ` +
      `Include: overview, common causes, step-by-step troubleshooting (5+ steps), FAQ, and when to contact support. ` +
      `Set state to "${state}". Author ID 8946047. Return the new article ID and URL.`
    );
    showResult("ok", r.texts + (r.tools.length ? "\n\nTools used: " + r.tools.join(", ") : ""));
    addLog(label, true);
    showToast("✅ " + label);
  } catch (err) {
    showResult("err", err.message);
    addLog(label, false);
    showToast("❌ " + err.message);
  } finally { busy = false; enableButtons(); }
}

function disableButtons() {
  document.querySelectorAll("#btnDraft, #btnLive").forEach(b => { b.disabled = true; b.textContent = "⏳ Working..."; });
}
function enableButtons() {
  const d = document.getElementById("btnDraft"), l = document.getElementById("btnLive");
  if (d) { d.disabled = false; d.textContent = "📝 Fix & Send to Draft"; }
  if (l) { l.disabled = false; l.textContent = "🚀 Fix & Make Live"; }
}

function showResult(type, text) {
  const box = document.getElementById("resultBox");
  if (!box) return;
  if (type === "loading") {
    box.innerHTML = `<div class="result ok" style="background:var(--blu-s);border-color:#93c5fd"><h4 style="color:var(--blu)">⏳ Working...</h4><pre>${text}</pre></div>`;
  } else if (type === "ok") {
    box.innerHTML = `<div class="result ok"><h4 style="color:var(--grn)">✅ Intercom Updated</h4><pre>${text}</pre></div>`;
  } else {
    box.innerHTML = `<div class="result err"><h4 style="color:var(--red)">❌ Error</h4><pre>${text}</pre></div>`;
  }
}

function addLog(label, ok) {
  actionLog.unshift({ ts: new Date().toLocaleTimeString(), label, ok });
  renderLog();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 4000);
}

// ════════ INIT ════════
renderKPIs(); renderKB(); renderEsc(); renderRoad(); renderLog();
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
</body>
