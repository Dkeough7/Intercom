function rScore(){const c=document.getElementById('t-score');const act=E.filter(e=>e.id!=='tbh3'&&(e.ns>0||e.sf>0));

let h=`<div class="st">🏆 Stack Ranking</div><div class="tcw"><table class="kt"><thead><tr><th>#</th><th>Agent</th><th>Q</th><th>NS</th><th>SF</th><th>Total</th><th>CSAT</th><th>Surveys</th><th>Tier</th></tr></thead><tbody>`;
ranked.forEach((r,i)=>{const rc=i<3?'r'+(i+1):'ro',t=r.e.cn>0?(r.e.cs>=4.8?'tg':r.e.cs>=4.5?'ty':'tr'):'ty',tl=t==='tg'?'Excellent':t==='ty'?'Good':'Focus';
h+=`<tr><td><span class="rb ${rc}">${i+1}</span></td><td style="color:${r.e.c};font-weight:700">${r.e.s}</td><td>${r.e.tm==='call'?'📞':'💬'}</td><td>${fm(r.e.ns)}</td><td>${fm(r.e.sf)}</td><td style="font-weight:700">${fm(r.tot)}</td><td class="${r.e.cn>0?(r.e.cs>=4.8?'kh':r.e.cs>=4.5?'kn':'km'):''}">${r.e.cn>0?r.e.cs.toFixed(2):'—'}</td><td>${r.e.cn||'—'}</td><td><span class="tier ${t}">${tl}</span></td></tr>`;});
h+=`</tbody></table></div>`;
h+=`<div class="st">👤 Individual</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:11px;font-weight:600">Select:</span><select class="scsel" id="sce">`;
act.forEach(e=>h+=`<option value="${e.id}" ${e.id===selSC?'selected':''}>${e.s}</option>`);h+=`</select></div>`;
const se=E.find(e=>e.id===selSC);
if(se){const tc=se.ns+se.sf,ga=act.reduce((a,r)=>a+r.ns+r.sf,0)/act.length;
const rings=[{l:'Total',v:tc,mx:5000,c:'var(--blue)'},{l:'NS',v:se.ns,mx:3000,c:'var(--pur)'},{l:'SF',v:se.sf,mx:2500,c:'var(--cyan)'},{l:'CSAT',v:se.cn>0?se.cs:0,mx:5,c:'var(--grn)'},{l:'Surveys',v:se.cn,mx:100,c:'var(--amb)'}];
h+=`<div class="scgrid">`;rings.forEach(rm=>{const p=Math.min((rm.v/rm.mx)*100,100),ci=2*Math.PI*42,of=ci-(p/100)*ci;
h+=`<div class="src"><div class="sr"><svg viewBox="0 0 100 100"><circle class="srbg" cx="50" cy="50" r="42"/><circle class="srf" cx="50" cy="50" r="42" stroke="${rm.c}" stroke-dasharray="${ci}" stroke-dashoffset="${of}"/></svg><div class="srv" style="color:${rm.c}">${typeof rm.v==='number'&&rm.v%1!==0?rm.v.toFixed(2):rm.v}</div></div><div class="srl">${rm.l}</div></div>`;});h+=`</div>`;
const comps=[{l:'Total Cases',i:tc,g:Math.round(ga),mx:5000,hi:true}];
if(se.cn>0){const gcsa=act.filter(e=>e.cn>0);const gcav=gcsa.reduce((a,e)=>a+e.cs,0)/gcsa.length;comps.push({l:'CSAT',i:se.cs,g:parseFloat(gcav.toFixed(2)),mx:5,hi:true});}
h+=`<div style="display:flex;gap:12px;margin-bottom:6px;font-size:9px;color:var(--t2)"><div style="display:flex;align-items:center;gap:3px"><div style="width:7px;height:7px;border-radius:50%;background:var(--cyan)"></div>${se.s}</div><div style="display:flex;align-items:center;gap:3px"><div style="width:7px;height:7px;border-radius:50%;background:var(--tm)"></div>Group</div></div>`;
h+=`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:12px">`;
comps.forEach(co=>{const ip=(co.i/co.mx)*100,gp=(co.g/co.mx)*100,ok=co.hi?co.i>=co.g:co.i<=co.g,ic=ok?'var(--grn)':'var(--red)';
h+=`<div class="cbrw"><div class="cbnm">${co.l}</div><div class="cbc"><div class="cbbg"></div><div class="cbg" style="width:${gp}%;background:var(--tm)"></div><div class="cbi" style="width:${ip}%;background:${ic}"></div></div><div class="cbv"><span style="color:${ic};font-weight:600">${typeof co.i==='number'&&co.i%1!==0?co.i.toFixed(2):fm(co.i)}</span><span style="color:var(--tm)">${typeof co.g==='number'&&co.g%1!==0?co.g.toFixed(2):fm(co.g)}</span></div></div>`;});h+=`</div>`;
const logs=clog[selSC]||[];
h+=`<div class="csec"><h3 style="font-size:12px;font-weight:700;margin-bottom:6px">📝 Coaching — ${se.s}</h3>`;
if(!logs.length)h+=`<p style="font-size:10px;color:var(--tm);margin-bottom:6px">No notes yet.</p>`;
logs.forEach((l,i)=>h+=`<div class="ce"><div class="ceh"><span>${l.d}</span><span style="cursor:pointer;color:var(--red)" data-dl="${i}">✕</span></div><div class="cet">${l.t}</div></div>`);
h+=`<div class="crow2"><input class="cinp" id="ci" placeholder="Add note..."><button class="cbtn" id="ca">Add</button></div></div>`;}
c.innerHTML=h;
document.getElementById('sce')?.addEventListener('change',ev=>{selSC=ev.target.value;rScore();});
document.getElementById('ca')?.addEventListener('click',()=>{const t=document.getElementById('ci')?.value.trim();if(!t)return;if(!clog[selSC])clog[selSC]=[];clog[selSC].push({d:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),t});rScore();});
c.querySelectorAll('[data-dl]').forEach(b=>b.addEventListener('click',()=>{clog[selSC].splice(parseInt(b.dataset.dl),1);rScore();}));}

<tr><td>SEV 2</td><td>100%</td><td class="kh">100%</td><td class="kh">100%</td><td class="kh">100%</td><td>—</td><td class="kh">100%</td><td>—</td><td>0</td></tr>

h+=`<div class="tcw"><div class="tct">⏱️ SEV 3 Close Time (days) & Backlog Age</div><table class="kt"><thead><tr><th>Type</th><th>KPI</th><th>Oct</th><th>Nov</th><th>Dec</th><th>Jan</th><th>Feb</th><th>Mar</th></tr></thead><tbody>
<tr><td>SW Close</td><td>90d</td><td class="kh">53</td><td class="km">106</td><td class="km">112</td><td class="kh">77</td><td class="kh">74</td><td class="km">166</td></tr>
<tr><td>HW Close</td><td>90d</td><td class="km">150</td><td class="km">104</td><td class="kh">56</td><td class="kh">66</td><td>—</td><td class="kh">66</td></tr>
<tr><td>Backlog Age</td><td>90d</td><td class="km">225</td><td class="km">215</td><td class="km">174</td><td class="km">202</td><td class="km">209</td><td class="km">210</td></tr>
</tbody></table></div>`;
const tix=[{id:'SEV3-287',sv:3,t:'Report exports timing out — enterprise',o:'Product',a:134,sl:90,cu:'Giant Eagle'},
{id:'SEV3-291',sv:3,t:'Android 14 crash — checklist',o:'Product',a:89,sl:90,cu:'Multiple'},
{id:'SEV3-301',sv:3,t:'Label printer FW connectivity',o:'Product',a:45,sl:90,cu:'Multiple'},
{id:'SEV3-308',sv:3,t:'API rate limit sync delays',o:'Product',a:21,sl:90,cu:'Enterprise'}];
h+=`<div class="st" style="margin-top:10px">🎫 Escalations</div>`;
tix.forEach(t=>{const ov=t.a>t.sl,p=Math.min((t.a/t.sl)*100,100);
h+=`<div class="slac"><div class="slah"><div style="display:flex;align-items:center;gap:6px"><span class="slsv sv${t.sv}">SEV ${t.sv}</span><strong style="font-size:10px">${t.id}</strong><span style="font-size:9px;color:var(--tm)">${t.cu}</span></div><div style="display:flex;align-items:center;gap:6px"><span class="sltm ${ov?'over':'ok'}">${ov?'⏰ OVERDUE':'✓ SLA'} ${t.a}/${t.sl}d</span><span style="font-size:9px;color:var(--tm)">${t.o}</span></div></div><div style="font-size:10px;margin-bottom:4px">${t.t}</div><div style="display:flex;align-items:center;gap:4px"><div style="flex:1;height:3px;background:var(--inp);border-radius:2px;overflow:hidden"><div style="height:100%;width:${p}%;background:${ov?'var(--red)':p>75?'var(--amb)':'var(--grn)'};border-radius:2px"></div></div><span style="font-size:8px;color:var(--tm)">${p.toFixed(0)}%</span></div></div>`;});
c.innerHTML=h;}
rLead();rSched();rMetrics();rCap();rScore();rSLA();
</script>
